<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freegle - EA Style</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@vkontakte/vkui@5.0.0/dist/vkui.css">
    
    <style>
        /* Aquí es donde tú "EA-codeas" sobre la base de VK */
        :root {
            --vkui--color_background: #ffffff;
            --vkui--color_text_primary: #161616;
            /* Aquí cambiarías los azules de VK por los colores de EA */
            --vkui--color_background_accent: #007cff; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Más estilo web EA */
        }

        .ea-header {
            height: 60px;
            border-bottom: 1px solid #e1e1e1;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background: #fff;
        }

        .freegle-container {
            max-width: 1000px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
        }

        /* Estilo para tus 3 monedas en el perfil */
        .currency-bar {
            background: #f5f5f5;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            font-weight: bold;
        }
    </style>
</head>
<body class="vkui--vkBase--light">

    <header class="ea-header">
        <h1 style="font-size: 20px;">Freegle</h1>
    </header>

    <div class="freegle-container">
        <aside>
            <nav>
                <div class="vkuiSimpleCell">Perfil</div>
                <div class="vkuiSimpleCell">Mensajes</div>
                <div class="vkuiSimpleCell">Tienda de Estatus</div>
            </nav>
        </aside>

        <main>
            <div class="currency-bar">
                <span title="Plata">🥈 150</span>
                <span title="Oro">🥇 10</span>
                <span title="Premium">💎 2</span>
            </div>

            <div style="margin-top: 20px;">
                <p>Bienvenido a Freegle. Aquí el estatus lo es todo.</p>
            </div>
        </main>
    </div>

</body>
</html>
