<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freegle - Crear Cuenta</title>
    <link rel="stylesheet" href="style.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .register-body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-base);
        }
        .register-card {
            background-color: var(--bg-base);
            border: 1px solid var(--bg-details);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .register-card h2 {
            font-family: 'Righteous', cursive;
            color: var(--text-title);
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--text-main);
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--bg-details);
            border-radius: 8px;
            background-color: var(--bg-base);
            color: var(--text-main);
            box-sizing: border-box;
        }
        .form-row {
            display: flex;
            gap: 10px;
        }
        .avatar-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px dashed var(--link-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            overflow: hidden;
            background-color: var(--bg-details);
        }
        /* Botón estilo paralelogramo adaptado */
        .btn-register {
            --p: 15px;
            width: 100%;
            background-color: var(--link-accent);
            color: white;
            font-family: 'Righteous', cursive;
            border: none;
            padding: 12px;
            cursor: pointer;
            clip-path: polygon(var(--p) 0, 100% 0, calc(100% - var(--p)) 100%, 0 100%);
            margin-top: 10px;
        }
        .error-msg {
            color: #d9534f;
            font-size: 11px;
            margin-top: 4px;
            display: none;
        }
    </style>
    <script>
    // Esto se ejecuta ANTES de que la página se dibuje
    const savedTheme = localStorage.getItem('themePreference');
    if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
    }
</script>
</head>
<body class="register-body">

    <div class="register-card">
        <h2>Únete a Freegle</h2>
        <form id="registerForm">
            
            <div class="avatar-upload">
                <div class="avatar-preview" id="preview">
                    <i class="fa-solid fa-camera"></i>
                </div>
                <input type="file" id="avatar" accept="image/*" style="display:none" onchange="previewImage(event)">
                <label for="avatar" style="color: var(--link-accent); cursor: pointer; font-size: 12px;">Subir foto de perfil</label>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex:1">
                    <label>Nombre</label>
                    <input type="text" id="name" required placeholder="Tu nombre">
                </div>
                <div class="form-group" style="flex:1">
                    <label>ID Usuario (@)</label>
                    <input type="text" id="username" required placeholder="usuario_123" pattern="^[a-zA-Z0-9_]+$">
                    <span class="error-msg" id="userError">Solo letras, números y '_'</span>
                </div>
            </div>

            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>

            <div class="form-group">
                <label>Fecha de Nacimiento</label>
                <input type="date" id="birthdate" required>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex:1">
                    <label>Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group" style="flex:1">
                    <label>Confirmar</label>
                    <input type="password" id="confirmPassword" required>
                </div>
            </div>

            <div class="form-group">
                <label>Biografía (Opcional)</label>
                <textarea id="bio" rows="2" placeholder="Cuéntanos sobre ti..."></textarea>
            </div>

            <button type="submit" class="btn-register">CREAR CUENTA</button>
        </form>
    </div>

    <script type="module">
    // 1. Importamos la conexión y las herramientas de Firebase
    import { auth, db, createUserWithEmailAndPassword, setDoc, doc } from './firebase-config.js';

    const WORKER_URL = "https://freegle-uploader.carvalloalan005.workers.dev/";
    const R2_PUBLIC_URL = "https://pub-991976d0c4fe4243a60ad4a18113a774.r2.dev"; 

    // Función para previsualizar la imagen
    window.previewImage = function(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const preview = document.getElementById('preview');
            preview.innerHTML = `<img src="${reader.result}" style="width:100%; height:100%; object-fit:cover;">`;
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    const registerForm = document.getElementById('registerForm');

    registerForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        
        // Captura de valores
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        const username = document.getElementById('username').value;
        const name = document.getElementById('name').value;
        const birthdate = document.getElementById('birthdate').value;
        const bio = document.getElementById('bio').value;
        const avatarFile = document.getElementById('avatar').files[0];

        if (pass !== confirm) {
            alert("Las contraseñas no coinciden");
            return;
        }

        try {
            // A. Crear el usuario en Firebase Authentication
            const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;

            let finalAvatarUrl = ""; // Por defecto vacío si no sube nada

            // B. Subida a Cloudflare R2 si hay un archivo seleccionado
            if (avatarFile) {
                const extension = avatarFile.name.split('.').pop();
                const fileName = `avatars/${user.uid}.${extension}`;
                
                // Llamada a tu Worker
                const uploadResponse = await fetch(`${WORKER_URL}?file=${fileName}`, {
                    method: 'POST',
                    body: avatarFile,
                    headers: { 'Content-Type': avatarFile.type }
                });

                if (uploadResponse.ok) {
                    finalAvatarUrl = `${R2_PUBLIC_URL}/${fileName}`;
                } else {
                    console.error("Error en el Worker al subir la imagen");
                }
            }

            // C. Guardar la información extendida en Firestore
            await setDoc(doc(db, "users", user.uid), {
                displayName: name,
                username: username.toLowerCase(),
                email: email,
                birthdate: birthdate,
                bio: bio,
                createdAt: new Date(),
                avatarUrl: finalAvatarUrl // Ahora sí guardamos el link real de R2
            });

            alert("¡Bienvenido a Freegle! Cuenta creada con foto.");
            window.location.href = "index.html";

        } catch (error) {
            console.error("Error al registrar:", error.code);
            if (error.code === 'auth/email-already-in-use') {
                alert("Este correo ya está registrado.");
            } else {
                alert("Hubo un error: " + error.message);
            }
        }
    });
</script>
</body>
</html>
